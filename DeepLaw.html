<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepLaw</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1D3A;--navy3:#1A2F5A;--gold:#C9A84C;--gold2:#E0BC6A;--gold3:#F5DFA0;--cream:#F8F5EE;--cream2:#EDE8DE;--cream3:#DDD6C8;--ink:#1A1A2E;--ink2:#2D2D45;--ink3:#4A4A6A;--muted:#7A7A9A;--border:#D0C9BC;--border2:#C0B8A8;--white:#fff;--r:6px;--r2:10px;font-family:Georgia,serif}
body{background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
#tb{background:var(--navy);padding:0 32px;display:flex;align-items:center;height:58px;gap:24px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--navy3)}
#lg{display:flex;align-items:center;gap:10px;cursor:pointer}
#lg svg{width:26px;height:26px;flex-shrink:0}
#lt{font-size:20px;font-weight:700;color:var(--gold2);font-family:Georgia,serif}
#lsb{font-size:10px;color:var(--gold3);opacity:.7;letter-spacing:.14em;text-transform:uppercase}
#ts{flex:1;max-width:480px;margin-left:auto;position:relative}
#ts input{width:100%;height:36px;border-radius:18px;border:1px solid rgba(201,168,76,.35);background:rgba(255,255,255,.07);color:#fff;padding:0 16px 0 38px;font-size:14px;font-family:Georgia,serif;outline:none}
#ts input::placeholder{color:rgba(255,255,255,.38)}
#ts input:focus{border-color:var(--gold)}
#si{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;width:16px;height:16px}
#tc{font-size:12px;color:rgba(201,168,76,.7);white-space:nowrap;font-family:sans-serif;margin-left:16px}
#lay{display:flex;flex:1;min-height:0}
#sb{width:256px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;overflow-y:auto;flex-shrink:0}
#mn{flex:1;overflow-y:auto;padding:28px 32px}
.ss{margin-bottom:22px}
.st{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:0 18px;margin-bottom:6px;font-family:sans-serif;font-weight:600}
.sbn{width:100%;text-align:left;padding:7px 18px;border:none;background:none;cursor:pointer;font-size:13.5px;color:var(--ink3);font-family:Georgia,serif;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:9px}
.sbn:hover{background:var(--cream);color:var(--navy)}
.sbn.active{background:var(--cream2);color:var(--navy);border-left-color:var(--gold);font-weight:600}
.sdv{height:1px;background:var(--border);margin:8px 18px 14px}
.fg{padding:0 18px;margin-bottom:14px}
.fl{font-size:10.5px;font-family:sans-serif;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;display:block}
.fs{width:100%;height:32px;border:1px solid var(--border2);border-radius:var(--r);background:var(--cream);color:var(--ink);font-size:13px;padding:0 8px;cursor:pointer;font-family:sans-serif;outline:none}
.fs:focus{border-color:var(--gold)}
#fclr{display:block;width:calc(100% - 36px);margin:4px 18px 0;height:30px;border:1px solid var(--border2);background:none;border-radius:var(--r);font-size:12px;color:var(--muted);cursor:pointer;font-family:sans-serif}
#fclr:hover{border-color:var(--navy);color:var(--navy)}
#hr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
#hr h1{font-size:18px;font-weight:700;color:var(--navy);font-family:Georgia,serif}
#rc{font-size:13px;color:var(--muted);font-family:sans-serif}
#srt{height:32px;border:1px solid var(--border2);border-radius:var(--r);background:var(--white);color:var(--ink);font-size:13px;padding:0 10px;cursor:pointer;font-family:sans-serif;outline:none}
#cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.cc{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px 40px;cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .18s;position:relative}
.cc:hover{border-color:var(--gold);box-shadow:0 4px 20px rgba(11,29,58,.13);transform:translateY(-1px)}
.cco{font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--gold);font-family:sans-serif;font-weight:600;margin-bottom:4px}
.cp{font-size:15px;font-weight:700;color:var(--navy);line-height:1.35;margin-bottom:7px;font-family:Georgia,serif}
.cm{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:9px}
.cm span{font-size:11.5px;color:var(--muted);font-family:sans-serif}
.cm .dot{color:var(--border2)}
.cac{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.ap{font-size:10.5px;padding:2px 8px;border-radius:10px;background:var(--cream2);color:var(--ink3);font-family:sans-serif;border:1px solid var(--border)}
.cv{font-size:12.5px;color:var(--ink3);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:Georgia,serif}
.car{position:absolute;right:16px;bottom:14px;color:var(--gold);font-size:18px;opacity:.5}
#dp{position:fixed;top:58px;right:0;bottom:0;width:520px;background:var(--white);border-left:1px solid var(--border);z-index:50;overflow-y:auto;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(11,29,58,.09)}
#dp.open{transform:translateX(0)}
#dh{position:sticky;top:0;background:var(--white);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10}
#dh span{font-size:11px;font-family:sans-serif;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
#cb{background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink3);line-height:1;padding:1px 6px;border-radius:4px}
#cb:hover{background:var(--cream)}
#db{padding:24px 24px 56px}
.dco{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-family:sans-serif;font-weight:600;margin-bottom:5px}
.dpa{font-size:19px;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:12px;font-family:Georgia,serif}
.dmr{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.dmi{display:flex;flex-direction:column;gap:2px}
.dml{font-size:9.5px;font-family:sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.11em;color:var(--muted)}
.dmv{font-size:13px;color:var(--ink);font-family:sans-serif}
.ds{margin-bottom:20px}
.dst{font-size:10px;font-family:sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.dst::after{content:'';flex:1;height:1px;background:var(--cream3)}
.dsx{font-size:13.5px;line-height:1.72;color:var(--ink2);font-family:Georgia,serif}
.dsp{display:flex;flex-wrap:wrap;gap:5px}
.dpill{font-size:12px;padding:3px 10px;border-radius:10px;background:var(--cream2);color:var(--ink3);font-family:sans-serif;border:1px solid var(--border)}
.pi{padding:10px 14px;border-left:3px solid var(--gold3);background:var(--cream);border-radius:0 var(--r) var(--r) 0;margin-bottom:8px;font-size:13px;line-height:1.68;color:var(--ink2);font-family:Georgia,serif}
.ni{padding:10px 14px;border-left:3px solid #B4B2A9;background:#F4F2EC;border-radius:0 var(--r) var(--r) 0;margin-bottom:8px;font-size:12.5px;line-height:1.65;color:var(--ink3);font-family:sans-serif;font-style:italic}
.divb{background:#FFF8EC;border:1px solid #E0BC6A;border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:12.5px;line-height:1.65;color:#4A3800;font-family:sans-serif}
#lst,#est,#ers{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px;gap:14px;text-align:center}
.sico{font-size:38px;color:var(--border2)}
.stitl{font-size:17px;font-weight:600;color:var(--ink3);font-family:Georgia,serif}
.ssub{font-size:13px;color:var(--muted);max-width:340px;font-family:sans-serif;line-height:1.6}
.spin{width:34px;height:34px;border:3px solid var(--cream3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#ov{display:none;position:fixed;inset:0;background:rgba(11,29,58,.2);z-index:40}
#ov.show{display:block}
#pgn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:28px;padding-bottom:24px}
.pb{height:32px;min-width:32px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--white);cursor:pointer;font-size:13px;font-family:sans-serif;color:var(--ink3)}
.pb:hover:not(:disabled){border-color:var(--gold);color:var(--navy)}
.pb:disabled{opacity:.38;cursor:default}
mark.hl{background:rgba(201,168,76,.3);border-radius:2px;padding:0 1px}
@media(max-width:900px){#sb{display:none}#mn{padding:18px 14px}#dp{width:100%}#cg{grid-template-columns:1fr}}
@media(max-width:600px){#tb{padding:0 14px}#lsb{display:none}}
</style>
</head>
<body>
<div id="tb">
<div id="lg" onclick="resetAll()">
  <svg viewBox="0 0 26 26" fill="none"><rect x="1" y="1" width="24" height="24" rx="4" fill="#1A2F5A" stroke="#C9A84C" stroke-width="1.2"/><rect x="5" y="7" width="10" height="1.5" rx="0.75" fill="#C9A84C"/><rect x="5" y="10.5" width="16" height="1.2" rx="0.6" fill="#E0BC6A" opacity="0.7"/><rect x="5" y="13.5" width="14" height="1.2" rx="0.6" fill="#E0BC6A" opacity="0.7"/><rect x="5" y="16.5" width="9" height="1.2" rx="0.6" fill="#E0BC6A" opacity="0.5"/><rect x="17" y="14" width="4" height="5" rx="1" fill="#C9A84C" opacity="0.9"/></svg>
  <div><div id="lt">DeepLaw</div><div id="lsb">Legal Research</div></div>
</div>
<div id="ts">
  <svg id="si" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="#F5DFA0" stroke-width="1.4"/><line x1="10" y1="10" x2="14" y2="14" stroke="#F5DFA0" stroke-width="1.4" stroke-linecap="round"/></svg>
  <input type="text" id="qi" placeholder="Search parties, principles, acts, judges..." autocomplete="off"/>
</div>
<div id="tc">Loading...</div>
</div>

<div id="lay">
<div id="sb">
  <div class="ss"><div class="st">Browse</div>
    <button class="sbn active" data-view="all">&#9776; All judgments</button>
    <button class="sbn" data-view="recent">&#128197; Recent judgments</button>
  </div>
  <div class="sdv"></div>
  <div class="ss"><div class="st">Filters</div>
    <div class="fg"><label class="fl">Court</label><select class="fs" id="fco"><option value="">All courts</option></select></div>
    <div class="fg"><label class="fl">Bench type</label><select class="fs" id="fbe"><option value="">All bench types</option><option value="single">Single judge</option><option value="division">Division bench</option><option value="full">Full bench</option></select></div>
    <div class="fg"><label class="fl">Year</label><select class="fs" id="fyr"><option value="">All years</option></select></div>
    <button id="fclr">Clear all filters</button>
  </div>
</div>

<div id="mn">
  <div id="hr">
    <h1 id="vt">All judgments</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="rc"></span>
      <select id="srt"><option value="date_desc">Newest first</option><option value="date_asc">Oldest first</option><option value="parties_asc">A-Z by parties</option></select>
    </div>
  </div>
  <div id="ca"><div id="lst"><div class="spin"></div><div class="stitl">Loading judgments...</div></div></div>
  <div id="pgn" style="display:none"></div>
</div>
</div>

<div id="ov"></div>
<div id="dp"><div id="dh"><span>Judgment detail</span><button id="cb">&#215;</button></div><div id="db"></div></div>

<script>
var SB='https://bdcubjjublocumfdctvl.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkY3Viamp1YmxvY3VtZmRjdHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTY1NDMsImV4cCI6MjA5ODIzMjU0M30.LCwQq1j-PVZgwLdC70Gycz5WXKGbCbbpIi3uw-kIsXo';
var PS=20,aD=[],fD=[],cP=1,cS='date_desc',sQ='',FC='',FB='',FY='',CV='all';

function S(v){if(v==null)return '';if(typeof v==='string')return v;if(Array.isArray(v))return v.join(' ');return String(v);}
function E(v){return S(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function HL(v,q){var s=E(v);if(!q)return s;try{var r=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return s.replace(r,'<mark class="hl">$1</mark>');}catch(e){return s;}}
function AA(v){if(Array.isArray(v))return v;if(typeof v==='string'&&v){try{var p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return[];}}return[];}
/* PT: extract principle text from either a plain string or a {text,paras,status} object */
function PT(p){if(p==null)return '';if(typeof p==='string')return p;if(typeof p==='object'&&p.text)return p.text;return String(p);}
/* PA: extract paras annotation from a principle object (empty string for plain strings) */
function PA(p){if(p&&typeof p==='object'&&p.paras)return p.paras;return '';}
/* PS_: extract status annotation from a principle object */
function PST(p){if(p&&typeof p==='object'&&p.status)return p.status;return '';}
function FD(d){if(!d)return '';try{return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}
function Q(p){return fetch(SB+p,{headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Accept':'application/json'}}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}

function loadAll(){
  showLoad();
  Q('/rest/v1/judgments?select=id,case_num,date,court_name,judges,bench_type,authoring_judge,parties,facts,observations,conclusion,note,divided_note,acts,sections,principles,minority_principles,ishaan_notes&order=date.desc')
  .then(function(d){aD=d||[];document.getElementById('tc').textContent=aD.length+' judgments';popF();render();})
  .catch(function(e){showErr(e.message);});
}

function popF(){
  var co={},yr={};
  aD.forEach(function(j){if(j.court_name)co[j.court_name]=1;if(j.date)yr[j.date.slice(0,4)]=1;});
  var cs=document.getElementById('fco');cs.innerHTML='<option value="">All courts</option>';
  Object.keys(co).sort().forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});
  var ys=document.getElementById('fyr');ys.innerHTML='<option value="">All years</option>';
  Object.keys(yr).sort(function(a,b){return b-a;}).forEach(function(y){var o=document.createElement('option');o.value=y;o.textContent=y;ys.appendChild(o);});
}

function render(){
  var d=aD.slice();
  if(CV==='recent'){var cu=new Date();cu.setMonth(cu.getMonth()-6);d=d.filter(function(j){return j.date&&new Date(j.date)>=cu;});}
  if(FC)d=d.filter(function(j){return j.court_name===FC;});
  if(FB)d=d.filter(function(j){return S(j.bench_type).toLowerCase().indexOf(FB)!==-1;});
  if(FY)d=d.filter(function(j){return j.date&&j.date.indexOf(FY)===0;});
  if(sQ){var q=sQ.toLowerCase();d=d.filter(function(j){
    return S(j.parties).toLowerCase().indexOf(q)!==-1||S(j.case_num).toLowerCase().indexOf(q)!==-1||
           S(j.court_name).toLowerCase().indexOf(q)!==-1||S(j.judges).toLowerCase().indexOf(q)!==-1||
           S(j.facts).toLowerCase().indexOf(q)!==-1||S(j.observations).toLowerCase().indexOf(q)!==-1||
           S(j.conclusion).toLowerCase().indexOf(q)!==-1||AA(j.principles).map(PT).join(' ').toLowerCase().indexOf(q)!==-1||
           AA(j.acts).join(' ').toLowerCase().indexOf(q)!==-1||AA(j.ishaan_notes).map(PT).join(' ').toLowerCase().indexOf(q)!==-1;
  });}
  if(cS==='date_desc')d.sort(function(a,b){return S(b.date).localeCompare(S(a.date));});
  else if(cS==='date_asc')d.sort(function(a,b){return S(a.date).localeCompare(S(b.date));});
  else d.sort(function(a,b){return S(a.parties).localeCompare(S(b.parties));});
  fD=d;cP=1;showPg();
}

function showPg(){
  var tot=fD.length,st=(cP-1)*PS,pd=fD.slice(st,st+PS);
  document.getElementById('rc').textContent=tot+(tot===1?' result':' results');
  var ar=document.getElementById('ca');
  if(tot===0){ar.innerHTML='<div id="est"><div class="sico">&#9878;</div><div class="stitl">No judgments found</div><div class="ssub">Try adjusting your search or filters.</div></div>';document.getElementById('pgn').style.display='none';return;}
  ar.innerHTML='<div id="cg"></div>';
  var g=document.getElementById('cg');
  pd.forEach(function(j){g.appendChild(mkC(j));});
  mkPg(tot);
}

function mkC(j){
  var el=document.createElement('div');el.className='cc';
  var ac=AA(j.acts),pr=AA(j.principles),pv=PT(pr[0])||S(j.conclusion)||S(j.facts),q=sQ.toLowerCase(),ah='';
  if(ac.length){var sh=ac.slice(0,2).map(function(a){return'<span class="ap">'+HL(a,q)+'</span>';}).join('');if(ac.length>2)sh+='<span class="ap">+'+(ac.length-2)+' more</span>';ah='<div class="cac">'+sh+'</div>';}
  var mp=[];
  if(j.date)mp.push('<span>'+E(FD(j.date))+'</span>');
  if(j.case_num)mp.push('<span class="dot">&middot;</span><span>'+HL(j.case_num,q)+'</span>');
  if(j.bench_type)mp.push('<span class="dot">&middot;</span><span style="text-transform:capitalize">'+E(S(j.bench_type))+'</span>');
  el.innerHTML='<div class="cco">'+HL(j.court_name,q)+'</div><div class="cp">'+HL(j.parties||j.id,q)+'</div>'+(mp.length?'<div class="cm">'+mp.join('')+'</div>':'')+ah+(pv?'<div class="cv">'+HL(pv,q)+'</div>':'')+'<div class="car">&#8599;</div>';
  el.onclick=function(){dtl(j);};return el;
}

function dtl(j){
  var ac=AA(j.acts),sc=AA(j.sections),pr=AA(j.principles),mn=AA(j.minority_principles),no=AA(j.ishaan_notes),h='';
  h+='<div class="dco">'+E(j.court_name)+'</div>';
  h+='<div class="dpa">'+E(S(j.parties||j.id))+'</div>';
  var m=[];
  if(j.date)m.push('<div class="dmi"><span class="dml">Date</span><span class="dmv">'+E(FD(j.date))+'</span></div>');
  if(j.case_num)m.push('<div class="dmi"><span class="dml">Case no.</span><span class="dmv">'+E(S(j.case_num))+'</span></div>');
  if(j.bench_type)m.push('<div class="dmi"><span class="dml">Bench</span><span class="dmv" style="text-transform:capitalize">'+E(S(j.bench_type))+'</span></div>');
  if(j.judges)m.push('<div class="dmi"><span class="dml">Judge(s)</span><span class="dmv">'+E(S(j.judges))+'</span></div>');
  if(j.authoring_judge&&S(j.authoring_judge)!==S(j.judges))m.push('<div class="dmi"><span class="dml">Authored by</span><span class="dmv">'+E(S(j.authoring_judge))+'</span></div>');
  if(m.length)h+='<div class="dmr">'+m.join('')+'</div>';
  if(S(j.divided_note))h+='<div class="divb">&#9888; <strong>Divided bench</strong> &mdash; '+E(S(j.divided_note))+'</div>';
  if(ac.length)h+='<div class="ds"><div class="dst">Acts &amp; legislation</div><div class="dsp">'+ac.map(function(a){return'<span class="dpill">'+E(S(a))+'</span>';}).join('')+'</div></div>';
  if(sc.length)h+='<div class="ds"><div class="dst">Sections</div><div class="dsp">'+sc.map(function(s){return'<span class="dpill">'+E(S(s))+'</span>';}).join('')+'</div></div>';
  if(S(j.facts))h+='<div class="ds"><div class="dst">Facts</div><div class="dsx">'+E(S(j.facts))+'</div></div>';
  if(S(j.observations))h+='<div class="ds"><div class="dst">Observations</div><div class="dsx">'+E(S(j.observations))+'</div></div>';
  if(S(j.conclusion))h+='<div class="ds"><div class="dst">Order &amp; conclusion</div><div class="dsx">'+E(S(j.conclusion))+'</div></div>';
  if(pr.length){h+='<div class="ds"><div class="dst">Legal principles ('+pr.length+')</div>';pr.forEach(function(p){var txt=PT(p),par=PA(p),st=PST(p),meta='';if(par||st){meta='<div style="margin-top:5px;font-size:10.5px;font-family:sans-serif;color:var(--muted)">'+(st?'<span style="text-transform:capitalize;margin-right:8px">&#9679; '+E(st)+'</span>':'')+(par?'<span>'+E(par)+'</span>':'')+'</div>';}h+='<div class="pi">'+E(txt)+meta+'</div>';});h+='</div>';}
  if(mn.length){h+='<div class="ds"><div class="dst">Minority / dissenting principles</div>';mn.forEach(function(p){var txt=PT(p),par=PA(p),st=PST(p),meta='';if(par||st){meta='<div style="margin-top:5px;font-size:10.5px;font-family:sans-serif;color:var(--muted)">'+(st?'<span style="text-transform:capitalize;margin-right:8px">&#9679; '+E(st)+'</span>':'')+(par?'<span>'+E(par)+'</span>':'')+'</div>';}h+='<div class="pi" style="border-left-color:#D85A30">'+E(txt)+meta+'</div>';});h+='</div>';}
  if(no.length){h+='<div class="ds"><div class="dst">Notes</div>';no.forEach(function(n){h+='<div class="ni">'+E(PT(n))+'</div>';});h+='</div>';}
  if(S(j.note))h+='<div class="ds"><div class="dst">Note</div><div class="dsx" style="font-size:13px;color:var(--muted)">'+E(S(j.note))+'</div></div>';
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('open');
  document.getElementById('ov').classList.add('show');
  document.getElementById('dp').scrollTop=0;
}

function closeD(){document.getElementById('dp').classList.remove('open');document.getElementById('ov').classList.remove('show');}

function mkPg(tot){
  var tp=Math.ceil(tot/PS),pg=document.getElementById('pgn');
  if(tp<=1){pg.style.display='none';return;}
  pg.style.display='flex';pg.innerHTML='';
  var pv=document.createElement('button');pv.className='pb';pv.textContent='< Prev';pv.disabled=cP===1;
  pv.onclick=function(){cP--;showPg();document.getElementById('mn').scrollTop=0;};pg.appendChild(pv);
  var inf=document.createElement('span');inf.textContent='Page '+cP+' of '+tp;inf.style.cssText='font-size:12px;color:var(--muted);font-family:sans-serif';pg.appendChild(inf);
  var nx=document.createElement('button');nx.className='pb';nx.textContent='Next >';nx.disabled=cP===tp;
  nx.onclick=function(){cP++;showPg();document.getElementById('mn').scrollTop=0;};pg.appendChild(nx);
}

function showLoad(){document.getElementById('ca').innerHTML='<div id="lst"><div class="spin"></div><div class="stitl">Loading judgments...</div></div>';document.getElementById('pgn').style.display='none';}
function showErr(msg){document.getElementById('ca').innerHTML='<div id="ers"><div class="sico">&#9888;</div><div class="stitl">Could not load judgments</div><div class="ssub">'+E(msg)+'</div></div>';document.getElementById('tc').textContent='Error';}

function resetAll(){
  sQ='';FC='';FB='';FY='';CV='all';
  document.getElementById('qi').value='';document.getElementById('fco').value='';
  document.getElementById('fbe').value='';document.getElementById('fyr').value='';
  document.getElementById('srt').value='date_desc';cS='date_desc';
  document.querySelectorAll('.sbn[data-view]').forEach(function(b){b.classList.remove('active');});
  document.querySelector('.sbn[data-view="all"]').classList.add('active');
  document.getElementById('vt').textContent='All judgments';render();
}

setInterval(function(){Q('/rest/v1/judgments?select=id&order=date.desc').then(function(d){if(d&&d.length!==aD.length)loadAll();}).catch(function(){});},60000);

var sti;
document.getElementById('qi').addEventListener('input',function(){clearTimeout(sti);var v=this.value.trim();sti=setTimeout(function(){sQ=v;render();},250);});
document.getElementById('fco').addEventListener('change',function(){FC=this.value;render();});
document.getElementById('fbe').addEventListener('change',function(){FB=this.value;render();});
document.getElementById('fyr').addEventListener('change',function(){FY=this.value;render();});
document.getElementById('fclr').addEventListener('click',function(){FC=FB=FY='';document.getElementById('fco').value='';document.getElementById('fbe').value='';document.getElementById('fyr').value='';render();});
document.getElementById('srt').addEventListener('change',function(){cS=this.value;render();});
document.getElementById('cb').addEventListener('click',closeD);
document.getElementById('ov').addEventListener('click',closeD);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeD();});
document.querySelectorAll('.sbn[data-view]').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.sbn[data-view]').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');CV=btn.getAttribute('data-view');
    document.getElementById('vt').textContent=CV==='recent'?'Recent judgments':'All judgments';render();
  });
});

loadAll();
</script>
</body>
</html>
